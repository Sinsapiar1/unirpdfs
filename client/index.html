<!doctype html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Unificador de PDFs - Versión Potenciada</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<style>
		:root { --bg:#0b1020; --card:#111731; --muted:#96a0b5; --text:#e5eaf5; --primary:#5e8bff; --accent:#22d3ee; --danger:#ef4444; }
		*{box-sizing:border-box}
		html,body{height:100%}
		body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:radial-gradient(1200px 800px at 10% -20%, rgba(34,211,238,.10) 0%, rgba(34,211,238,0) 50%), radial-gradient(1000px 700px at 120% 0%, rgba(94,139,255,.12) 0%, rgba(94,139,255,0) 60%), var(--bg);color:var(--text)}
		.container{max-width:1100px;margin:0 auto;padding:32px}
		header{display:flex;gap:16px;align-items:center;justify-content:space-between;margin-bottom:24px}
		.brand{display:flex;gap:12px;align-items:center}
		.badge{font-size:12px;color:#9fb3ff;border:1px solid rgba(94,139,255,.35);padding:4px 8px;border-radius:999px;background:linear-gradient(180deg, rgba(94,139,255,.12), rgba(94,139,255,.05));}
		.grid{display:grid;grid-template-columns:1fr;gap:16px}
		@media(min-width:960px){.grid{grid-template-columns:2fr 1fr}}
		.card{background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));border:1px solid rgba(255,255,255,0.08);backdrop-filter: blur(8px);border-radius:16px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
		.tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
		.tab{cursor:pointer;padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);color:var(--muted);font-weight:600}
		.tab.active{background:linear-gradient(180deg, rgba(94,139,255,.18), rgba(94,139,255,.08));color:#dbe5ff;border-color:rgba(94,139,255,.35)}
		.drop{border:2px dashed rgba(255,255,255,.15);border-radius:14px;padding:28px;text-align:center;color:var(--muted);transition:.2s;}
		.drop.dragover{border-color:var(--accent);color:#b6f3fc;background:rgba(34,211,238,.05)}
		.actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:16px}
		button{appearance:none;border:0;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer;transition:.2s;background:linear-gradient(180deg, rgba(94,139,255,.9), rgba(94,139,255,.7));color:white}
		button.secondary{background:transparent;border:1px solid rgba(255,255,255,.14);color:#c9d2ea}
		button:disabled{opacity:.6;cursor:not-allowed}
		.progress{height:10px;background:#0c1327;border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.12)}
		.progress>span{display:block;height:100%;width:0%;background:linear-gradient(90deg, var(--accent), var(--primary));transition:width .2s}
		.kv{display:grid;grid-template-columns:120px 1fr;gap:8px;color:#b9c3dc}
		.footer{margin-top:18px;color:#9aa6c7;font-size:12px}
		input[type="text"]{width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.03);color:var(--text)}
		.small{font-size:12px;color:#a4afc9}
	</style>
</head>
<body>
	<div class="container">
		<header>
			<div class="brand">
				<svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="logo"><path d="M12 2l3 3-3 3-3-3 3-3zm0 14l3 3-3 3-3-3 3-3zM2 12l3-3 3 3-3 3-3-3zm14 0l3-3 3 3-3 3-3-3z" fill="url(#g)"/><defs><linearGradient id="g" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#5e8bff"/></linearGradient></defs></svg>
				<div>
					<div style="font-size:20px;font-weight:800;letter-spacing:.4px">Unificador de PDFs - Potenciado</div>
					<div class="badge" aria-live="polite">Procesamiento en servidor • pdftk • pandoc • ImageMagick • Tabula</div>
					<div class="small">Conexión de progreso activa por SSE</div>
				</div>
			</div>
		</header>

		<div class="grid">
			<div class="card">
				<div class="tabs" id="tabs" role="tablist" aria-label="Operaciones"></div>
				<div id="panel" aria-live="polite"></div>
			</div>
			<div class="card">
				<div style="font-weight:700;margin-bottom:8px">Progreso</div>
				<div class="progress" aria-label="Barra de progreso"><span id="bar"></span></div>
				<div class="kv" style="margin-top:16px">
					<div>Estado:</div><div id="status">Esperando archivos…</div>
					<div>Tarea:</div><div id="task">—</div>
					<div>Resultado:</div><div id="result"><span style="color:#9aa6c7">—</span></div>
				</div>
				<div class="footer">Tu archivo se procesa de forma segura en el servidor. Nada se almacena permanentemente.</div>
			</div>
		</div>
	</div>
	<script type="module" src="/main.js"></script>
</body>
</html>
